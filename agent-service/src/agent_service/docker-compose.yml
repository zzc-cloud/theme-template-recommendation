# Docker Compose 配置
# 使用方式：docker-compose up -d

version: "3.8"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theme-template-agent
    ports:
      - "8000:8000"
    environment:
      # Neo4j 配置
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      # SiliconFlow API
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      # LLM 模型
      - LLM_MODEL=${LLM_MODEL:-/}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      # 向量库
      - CHROMA_PATH=/app/chroma_data
      # Agent 参数
      - MAX_ITERATION_ROUNDS=3
      - CONVERGENCE_SIMILARITY_THRESHOLD=0.80
    volumes:
      # 挂载向量库数据（可选）
      - ./chroma_data:/app/chroma_data
      # 挂载 .env 文件（可选，通过环境变量更安全）
      # - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    extra_hosts:
      # 让容器能访问宿主机的 Neo4j（macOS/Windows）
      - "host.docker.internal:host-gateway"

  # 可选：同时运行 Neo4j（开发用，生产应使用独立服务）
  # neo4j:
  #   image: neo4j:5-community
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     - NEO4J_AUTH=neo4j/password
  #   volumes:
  #     - ./neo4j_data:/data

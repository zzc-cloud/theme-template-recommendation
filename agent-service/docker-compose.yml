# Docker Compose 配置
# 用于快速部署 Agent Service + Neo4j 本地开发环境

services:
  # ─────────────────────────────────────────────
  # Agent Service API
  # ─────────────────────────────────────────────
  agent-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theme-template-agent
    ports:
      - "8000:8000"
    environment:
      # Neo4j 连接（通过 docker network 访问）
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # SiliconFlow API
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      # LLM 配置
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      # 向量库路径（挂载本地 Chroma 数据）
      CHROMA_PATH: /app/chroma
      # Agent 行为参数
      MAX_ITERATION_ROUNDS: ${MAX_ITERATION_ROUNDS:-3}
      VECTOR_SEARCH_TOP_K: ${VECTOR_SEARCH_TOP_K:-20}
    volumes:
      # 挂载本地 Chroma 向量库（如有）
      - ${CHROMA_PATH:-../mcp-server/data/indicators_vector}:/app/chroma:ro
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # Neo4j 数据库（可选，本地开发用）
  # 生产环境建议使用已有的 Neo4j 服务
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5.25.0
    container_name: theme-template-neo4j
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: yes
      # 增加内存（根据服务器配置调整）
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_server_memory_pagecache_size: 1g
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  agent-network:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
